openapi: 3.1.0

info:
  title: VirtualRadio API
  version: 1.0.0
  description: |
    API REST de **VirtualRadio**: plataforma que genera de forma automatizada
    programas de radio satíricos (estilo WCTR) para videojuegos de simulación
    (Farming Simulator 25, Euro Truck Simulator 2, etc.).

    El backend orquesta una biblioteca musical local, un universo narrativo
    compartido (noticias, comerciales, personajes y memoria narrativa) y un
    pipeline de generación por agentes que produce episodios de audio listos
    para reproducir.

    ## Autenticación
    Autenticación mediante **JWT** (Flask-JWT-Extended). `POST /auth/login`
    emite un *access token* y un *refresh token*; `POST /auth/refresh` renueva
    el *access token* a partir de un *refresh token* válido. Todos los endpoints
    salvo los de `auth` y `health` requieren `Authorization: Bearer <access_token>`.

    ## Autorización (RBAC)
    Modelo deliberadamente simple: un único rol de sistema `USER` y un único
    scope efectivo `own`. Cada consulta se filtra por `owner_id = current_user.id`.
    El `owner_id` se toma **siempre del token**, nunca del body. El acceso a un
    recurso de otro usuario devuelve **404** (no 403) para no revelar su existencia.

    ## Contrato de respuestas
    - Éxito: `{ "data": ..., "meta": {...} }`
    - Error: `{ "error": { "code", "message", "details" } }`
  contact:
    name: Equipo de Plataforma / Backend
  license:
    name: Propietario

servers:
  - url: /api/v1
    description: Prefijo base de la API (todas las rutas cuelgan de /api/v1)

tags:
  - name: Health
    description: Comprobación de estado del servicio
  - name: Auth
    description: Registro, login y renovación de tokens
  - name: Stations
    description: Estaciones de radio configurables
  - name: Episodes
    description: Generación, catálogo y exportación de episodios
  - name: Jobs
    description: Estado de los jobs de generación asíncrona
  - name: Music
    description: Biblioteca musical (indexación de MP3)
  - name: News
    description: Biblioteca compartida de noticias
  - name: Brands
    description: Marcas ficticias del universo compartido
  - name: Commercials
    description: Anuncios de las marcas
  - name: Characters
    description: Personajes recurrentes y su memoria narrativa
  - name: Story Events
    description: Arcos narrativos del universo
  - name: Universe
    description: Resumen y estadísticas del universo del usuario

security:
  - bearerAuth: []

paths:
  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  /health:
    get:
      tags: [Health]
      summary: Healthcheck del servicio
      description: Endpoint público de comprobación de salud (sin autenticación).
      operationId: getHealth
      security: []
      responses:
        '200':
          description: El servicio está operativo
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok
                      version:
                        type: string
                        example: 1.0.0
                  meta:
                    $ref: '#/components/schemas/Meta'

  # ---------------------------------------------------------------------------
  # Auth
  # ---------------------------------------------------------------------------
  /auth/register:
    post:
      tags: [Auth]
      summary: Registro de usuario
      description: |
        Da de alta una cuenta de usuario y siembra su universo por defecto
        (estaciones, marcas, comerciales, personajes y noticias). Endpoint público.
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuario creado y tokens emitidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '409':
          description: El email ya está registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Inicio de sesión
      description: Verifica credenciales y emite un access token y un refresh token. Endpoint público.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Autenticación correcta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokensResponse'
        '401':
          description: Credenciales inválidas o usuario inactivo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      description: |
        Emite un nuevo *access token* a partir de un *refresh token* válido.
        Debe enviarse el refresh token en el header `Authorization: Bearer <refresh_token>`.
      operationId: refresh
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Nuevo access token emitido
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---------------------------------------------------------------------------
  # Stations
  # ---------------------------------------------------------------------------
  /stations:
    get:
      tags: [Stations]
      summary: Listar estaciones
      description: 'Permiso: `station:read:own`.'
      operationId: listStations
      responses:
        '200':
          description: Lista de estaciones del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Stations]
      summary: Crear estación
      description: 'Permiso: `station:create:own`. El `owner_id` se toma del token.'
      operationId: createStation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StationInput'
      responses:
        '201':
          description: Estación creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /stations/suggest:
    post:
      tags: [Stations]
      summary: Sugerir estación por IA
      description: |
        Genera una propuesta de estación con el LLM (con fallback procedural
        determinista si el LLM no responde). Permiso: `station:suggest:own`.
      operationId: suggestStation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuggestRequest'
      responses:
        '200':
          description: Sugerencia de estación (no persistida)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /stations/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [Stations]
      summary: Obtener estación
      description: 'Permiso: `station:read:own`.'
      operationId: getStation
      responses:
        '200':
          description: Estación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Stations]
      summary: Actualizar estación
      description: 'Permiso: `station:update:own`.'
      operationId: updateStation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StationInput'
      responses:
        '200':
          description: Estación actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Stations]
      summary: Eliminar estación
      description: 'Permiso: `station:delete:own`. Borra en cascada episodios y jobs asociados.'
      operationId: deleteStation
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /stations/{id}/episode-settings:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [Stations]
      summary: Obtener ajustes del guion de la estación
      description: 'Permiso: `station:read_settings:own`. Crea los ajustes con valores por defecto si aún no existen.'
      operationId: getEpisodeSettings
      responses:
        '200':
          description: Ajustes del guion de la estación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpisodeSettingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Stations]
      summary: Actualizar ajustes del guion de la estación
      description: 'Permiso: `station:update_settings:own`. Acepta cualquier subconjunto de los campos.'
      operationId: updateEpisodeSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EpisodeSettingsInput'
      responses:
        '200':
          description: Ajustes actualizados
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpisodeSettingsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

  # ---------------------------------------------------------------------------
  # Episodes
  # ---------------------------------------------------------------------------
  /episodes:
    get:
      tags: [Episodes]
      summary: Listar episodios
      description: 'Permiso: `episode:read:own`. Filtrado por `owner_id`.'
      operationId: listEpisodes
      parameters:
        - name: station_id
          in: query
          required: false
          description: Filtrar episodios por estación
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de episodios del usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpisodeList'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /episodes/generate:
    post:
      tags: [Episodes]
      summary: Generar episodio
      description: |
        Encola un job de generación de episodio para una estación y devuelve el
        UUID del job para hacer polling vía `GET /jobs/{id}`. El pipeline corre
        de forma asíncrona en el worker Celery. Permiso: `episode:generate:own`.
      operationId: generateEpisode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateEpisodeRequest'
      responses:
        '202':
          description: Job encolado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: La estación indicada no existe o pertenece a otro usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/ValidationError'

  /episodes/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [Episodes]
      summary: Obtener episodio
      description: 'Permiso: `episode:read:own`. Incluye `script_json` parseado.'
      operationId: getEpisode
      responses:
        '200':
          description: Episodio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EpisodeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Episodes]
      summary: Eliminar episodio
      description: |
        Elimina el registro del episodio y su archivo MP3 del volumen de media.
        Permiso: `episode:delete:own`.
      operationId: deleteEpisode
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /episodes/{id}/audio:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [Episodes]
      summary: Servir audio del episodio
      description: |
        Devuelve el MP3 exportado del episodio, con control de acceso por
        propietario. Permiso: `episode:read:own`. Soporta peticiones por rango
        (`Range`) para streaming/seek desde el reproductor.
      operationId: getEpisodeAudio
      responses:
        '200':
          description: Stream de audio MP3
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '206':
          description: Contenido parcial (respuesta a una petición Range)
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: El episodio no existe, pertenece a otro usuario o aún no tiene audio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ---------------------------------------------------------------------------
  # Jobs
  # ---------------------------------------------------------------------------
  /jobs/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [Jobs]
      summary: Estado de un job de generación
      description: |
        Devuelve el estado y progreso de un job de generación de episodio para
        hacer polling. Permiso: `job:read:own`.
      operationId: getJob
      responses:
        '200':
          description: Estado del job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # Music
  # ---------------------------------------------------------------------------
  /music:
    get:
      tags: [Music]
      summary: Listar pistas musicales
      description: |
        Lista la biblioteca musical del usuario; el `meta` incluye la duración
        total. Permiso: `music:read:own`.
      operationId: listMusic
      responses:
        '200':
          description: Lista de pistas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MusicTrackList'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /music/upload:
    post:
      tags: [Music]
      summary: Subir pista MP3
      description: |
        Sube un archivo MP3 (multipart), extrae metadatos y lo registra con
        deduplicación por hash MD5 dentro del ámbito del usuario.
        Permiso: `music:upload:own`.
      operationId: uploadMusic
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Archivo MP3 a indexar
      responses:
        '201':
          description: Pista registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MusicTrackResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: La pista ya existe (hash duplicado para el usuario)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/ValidationError'

  /music/scan:
    post:
      tags: [Music]
      summary: Escanear carpeta de música
      description: |
        Recorre la carpeta de música del usuario, da de alta archivos nuevos y
        limpia los inexistentes, sincronizando el sistema de archivos con la BD.
        Permiso: `music:scan:own`.
      operationId: scanMusic
      responses:
        '200':
          description: Resultado del escaneo
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      added:
                        type: integer
                        description: Pistas nuevas indexadas
                      removed:
                        type: integer
                        description: Pistas eliminadas (ya no existen en disco)
                      total:
                        type: integer
                        description: Total de pistas tras la sincronización
                  meta:
                    $ref: '#/components/schemas/Meta'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /music/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    delete:
      tags: [Music]
      summary: Eliminar pista
      description: 'Permiso: `music:delete:own`.'
      operationId: deleteMusic
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # News
  # ---------------------------------------------------------------------------
  /news:
    get:
      tags: [News]
      summary: Listar noticias
      description: 'Permiso: `news:read:own`.'
      operationId: listNews
      parameters:
        - name: is_active
          in: query
          required: false
          description: Filtrar por estado activo
          schema:
            type: boolean
        - name: category
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/NewsCategory'
      responses:
        '200':
          description: Lista de noticias
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsItemList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [News]
      summary: Crear noticia
      description: 'Permiso: `news:create:own`.'
      operationId: createNews
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewsItemInput'
      responses:
        '201':
          description: Noticia creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsItemResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /news/suggest:
    post:
      tags: [News]
      summary: Sugerir noticia por IA
      description: 'Permiso: `news:suggest:own`. Fallback procedural si el LLM falla.'
      operationId: suggestNews
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuggestRequest'
      responses:
        '200':
          description: Sugerencia de noticia (no persistida)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsItemResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /news/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [News]
      summary: Obtener noticia
      description: 'Permiso: `news:read:own`.'
      operationId: getNews
      responses:
        '200':
          description: Noticia
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsItemResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [News]
      summary: Actualizar noticia
      description: 'Permiso: `news:update:own`.'
      operationId: updateNews
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewsItemInput'
      responses:
        '200':
          description: Noticia actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsItemResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [News]
      summary: Eliminar noticia
      description: 'Permiso: `news:delete:own`.'
      operationId: deleteNews
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # Brands
  # ---------------------------------------------------------------------------
  /brands:
    get:
      tags: [Brands]
      summary: Listar marcas
      description: 'Permiso: `brand:read:own`.'
      operationId: listBrands
      responses:
        '200':
          description: Lista de marcas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Brands]
      summary: Crear marca
      description: 'Permiso: `brand:create:own`.'
      operationId: createBrand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrandInput'
      responses:
        '201':
          description: Marca creada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /brands/suggest:
    post:
      tags: [Brands]
      summary: Sugerir marca por IA
      description: 'Permiso: `brand:suggest:own`. Fallback procedural si el LLM falla.'
      operationId: suggestBrand
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SuggestRequest'
      responses:
        '200':
          description: Sugerencia de marca (no persistida)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /brands/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
    get:
      tags: [Brands]
      summary: Obtener marca
      description: 'Permiso: `brand:read:own`.'
      operationId: getBrand
      responses:
        '200':
          description: Marca
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Brands]
      summary: Actualizar marca
      description: 'Permiso: `brand:update:own`.'
      operationId: updateBrand
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrandInput'
      responses:
        '200':
          description: Marca actualizada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Brands]
      summary: Eliminar marca
      description: 'Permiso: `brand:delete:own`. Borra en cascada sus comerciales.'
      operationId: deleteBrand
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # Commercials
  # ---------------------------------------------------------------------------
  /commercials:
    get:
      tags: [Commercials]
      summary: Listar comerciales
      description: 'Permiso: `commercial:read:own`.'
      operationId: listCommercials
      parameters:
        - name: brand_id
          in: query
          required: false
          description: Filtrar comerciales por marca
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de comerciales
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommercialList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Commercials]
      summary: Crear comercial
      description: 'Permiso: `commercial:create:own`. Requiere una marca existente del usuario.'
      operationId: createCommercial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommercialInput'
      responses:
        '201':
          description: Comercial creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommercialResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: La marca indicada no existe o pertenece a otro usuario
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/ValidationError'

  /commercials/suggest:
    post:
      tags: [Commercials]
      summary: Sugerir comercial por IA
      description: 'Permiso: `commercial:suggest:own`. Fallback procedural si el LLM falla.'
      operationId: suggestCommercial
      requestBody:
        required: false
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/SuggestRequest'
                - type: object
                  properties:
                    brand_id:
                      type: string
                      format: uuid
                      description: Marca para la que generar el comercial
      responses:
        '200':
          description: Sugerencia de comercial (no persistida)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommercialResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /commercials/{id}:
    parameters:
      - $ref: '#/components/parameters/IdParam'
