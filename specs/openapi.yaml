      operationId: getCommercial
      responses:
        '200':
          description: Comercial
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommercialResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Commercials]
      summary: Actualizar comercial
      description: 'Permiso: `commercial:update:own`.'
      operationId: updateCommercial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommercialInput'
      responses:
        '200':
          description: Comercial actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommercialResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [Commercials]
      summary: Eliminar comercial
      description: 'Permiso: `commercial:delete:own`.'
      operationId: deleteCommercial
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

