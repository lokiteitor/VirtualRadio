# =============================================================================
# Components
# =============================================================================
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Token JWT emitido por `/auth/login` o `/auth/refresh`.'

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Identificador UUID del recurso
      schema:
        type: string
        format: uuid

  responses:
    NoContent:
      description: Operación realizada con éxito (sin contenido)
    Unauthorized:
      description: Token ausente, inválido o expirado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: UNAUTHORIZED
              message: Token inválido o ausente
              details: {}
    NotFound:
      description: |
        El recurso no existe o pertenece a otro usuario (se devuelve 404 en
        ambos casos para no revelar su existencia).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: NOT_FOUND
              message: Recurso no encontrado
              details: {}
    ValidationError:
      description: Error de validación de los datos enviados
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: VALIDATION_ERROR
              message: Los datos enviados no son válidos
              details:
                name: ["El campo es obligatorio"]

  schemas:
    # ---- Envoltorios y comunes ------------------------------------------------
    Meta:
      type: object
      description: Metadatos de la respuesta (paginación, conteos, etc.)
      additionalProperties: true
      example: {}

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: Código de error legible por máquina
              example: VALIDATION_ERROR
            message:
              type: string
              description: Descripción del error
            details:
              type: object
              description: Detalles adicionales (ej. errores por campo)
              additionalProperties: true

    Timestamps:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    # ---- Enums ----------------------------------------------------------------
    NewsCategory:
      type: string
      description: Categoría temática de la noticia
      enum:
        - Agricultura
        - Transporte
        - Economía
        - Tecnología
        - Clima
        - Comunidad
        - Política Local
        - Sucesos Extraños

    NewsTone:
      type: string
      description: Tono narrativo de la noticia
      enum:
        - Serio
        - Sensacionalista
        - Misterioso
        - Absurdo

    StoryStatus:
      type: string
      description: Estado de un arco narrativo
      enum:
        - active
        - resolved

    JobStatus:
      type: string
      description: Estado del pipeline de generación
      enum:
        - queued
        - planning
        - synthesizing
        - mixing
        - completed
        - failed

    SegmentType:
      type: string
      description: Tipo de segmento del guion
      enum:
        - speech
        - music
        - fx

    # ---- Auth -----------------------------------------------------------------
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          format: password
          minLength: 8
        display_name:
          type: string
          maxLength: 120

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
        display_name:
          type: string
          nullable: true
        is_active:
          type: boolean
          readOnly: true
      allOf:
        - $ref: '#/components/schemas/Timestamps'

    AuthTokensResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            access_token:
              type: string
            refresh_token:
              type: string
            user:
              $ref: '#/components/schemas/User'
        meta:
          $ref: '#/components/schemas/Meta'

    SuggestRequest:
      type: object
      description: Pista/contexto opcional para guiar la sugerencia del LLM.
      properties:
        prompt:
          type: string
          description: Indicación libre para orientar la generación
        context:
          type: object
          description: Contexto adicional (ej. estación, tema)
          additionalProperties: true

    # ---- Stations -------------------------------------------------------------
    StationInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 120
          description: Nombre de la estación (único por usuario)
        host_name:
          type: string
          maxLength: 120
          nullable: true
        description:
          type: string
          nullable: true
        personality:
          type: string
          nullable: true
        frequency:
          type: string
          maxLength: 20
          nullable: true
          example: "99.1 FM"
        emoji:
          type: string
          maxLength: 16
          nullable: true
        color:
          type: string
          maxLength: 9
          nullable: true
          example: "#FFAA00"
        intro_templates:
          type: array
          items:
            type: string
          default: []
        outro_templates:
          type: array
          items:
            type: string
          default: []

    Station:
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            owner_id:
              type: string
              format: uuid
              readOnly: true
        - $ref: '#/components/schemas/StationInput'
        - $ref: '#/components/schemas/Timestamps'

    StationResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Station'
        meta:
          $ref: '#/components/schemas/Meta'

    StationList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Station'
        meta:
          $ref: '#/components/schemas/Meta'

    EpisodeSettingsInput:
      type: object
      description: Parámetros del guion del episodio, por estación. Todos opcionales en PUT.
      properties:
        song_count:
          type: integer
          minimum: 0
          maximum: 10
          default: 3
          description: Número de canciones por episodio (siempre suenan completas).
        news_count:
          type: integer
          minimum: 0
          maximum: 5
          default: 1
        commercial_count:
          type: integer
          minimum: 0
          maximum: 5
          default: 1
        caller_count:
          type: integer
          minimum: 0
          maximum: 5
          default: 1
        memories_per_caller:
          type: integer
          minimum: 0
          maximum: 10
          default: 3
        language:
          type: string
          enum: [es, en]
          default: es
          description: Idioma del guion generado (español o inglés).

    EpisodeSettings:
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            owner_id:
              type: string
              format: uuid
              readOnly: true
            station_id:
              type: string
              format: uuid
              readOnly: true
        - $ref: '#/components/schemas/EpisodeSettingsInput'
        - $ref: '#/components/schemas/Timestamps'

    EpisodeSettingsResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/EpisodeSettings'
        meta:
          $ref: '#/components/schemas/Meta'

    # ---- Episodes -------------------------------------------------------------
    ScriptSegment:
      type: object
      description: Segmento del guion del episodio.
      properties:
        type:
          $ref: '#/components/schemas/SegmentType'
        speaker:
          type: string
          nullable: true
          description: Locutor/personaje (para segmentos speech)
        text:
          type: string
          nullable: true
          description: Texto a sintetizar (para segmentos speech)
        voice_id:
          type: string
          nullable: true
          description: Voz Gemini TTS usada
        effect:
          type: string
          nullable: true
          description: Efecto aplicado (ej. telefonía, sweeper)
        track_id:
          type: string
          format: uuid
          nullable: true
          description: Pista musical referenciada (para segmentos music)
        duration_seconds:
          type: number
          format: float
          nullable: true

    GenerateEpisodeRequest:
      type: object
      required: [station_id]
      properties:
        station_id:
          type: string
          format: uuid
          description: Estación para la que generar el episodio

    Episode:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        owner_id:
          type: string
          format: uuid
          readOnly: true
        station_id:
          type: string
          format: uuid
        episode_number:
          type: integer
          readOnly: true
          description: Número de episodio autoincremental, determinista por estación.
        title:
          type: string
          maxLength: 200
        duration:
          type: number
          format: float
          description: Duración total en segundos (0 hasta compilar)
          readOnly: true
        script_json:
          type: array
          items:
            $ref: '#/components/schemas/ScriptSegment'
        audio_path:
          type: string
          maxLength: 500
          nullable: true
          readOnly: true
          description: Ruta relativa del MP3 exportado
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    EpisodeResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Episode'
        meta:
          $ref: '#/components/schemas/Meta'

    EpisodeList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Episode'
        meta:
          $ref: '#/components/schemas/Meta'

    # ---- Jobs -----------------------------------------------------------------
    Job:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        owner_id:
          type: string
          format: uuid
          readOnly: true
        station_id:
          type: string
          format: uuid
        episode_id:
          type: string
          format: uuid
          nullable: true
          description: Episodio resultante (cuando completa)
        status:
          $ref: '#/components/schemas/JobStatus'
        progress:
          type: integer
          minimum: 0
          maximum: 100
        error:
          type: string
          nullable: true
          description: Mensaje de error si status = failed
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    JobResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Job'
        meta:
          $ref: '#/components/schemas/Meta'

    # ---- Music ----------------------------------------------------------------
    MusicTrack:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        owner_id:
          type: string
          format: uuid
          readOnly: true
        file_path:
          type: string
          maxLength: 700
          readOnly: true
        title:
          type: string
          maxLength: 255
          nullable: true
        artist:
          type: string
          maxLength: 255
          nullable: true
        album:
          type: string
          maxLength: 255
          nullable: true
        duration:
          type: number
          format: float
          nullable: true
        file_hash:
          type: string
          description: MD5 del archivo (32 caracteres)
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    MusicTrackResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/MusicTrack'
        meta:
          $ref: '#/components/schemas/Meta'

    MusicTrackList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MusicTrack'
        meta:
          allOf:
            - $ref: '#/components/schemas/Meta'
            - type: object
              properties:
                total_duration:
                  type: number
                  format: float
                  description: Duración total de la biblioteca en segundos
                count:
                  type: integer

    # ---- News -----------------------------------------------------------------
    NewsItemInput:
      type: object
      required: [headline, category, tone]
      properties:
        headline:
          type: string
          maxLength: 300
        summary:
          type: string
          nullable: true
        full_script:
          type: string
          nullable: true
          description: Guion de lectura (3-5 frases)
        category:
          $ref: '#/components/schemas/NewsCategory'
        tone:
          $ref: '#/components/schemas/NewsTone'
        is_active:
          type: boolean
          default: true
        expires_at:
          type: string
          format: date-time
          nullable: true

    NewsItem:
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            owner_id:
              type: string
              format: uuid
              readOnly: true
        - $ref: '#/components/schemas/NewsItemInput'
        - $ref: '#/components/schemas/Timestamps'

    NewsItemResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/NewsItem'
        meta:
          $ref: '#/components/schemas/Meta'

    NewsItemList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/NewsItem'
        meta:
          $ref: '#/components/schemas/Meta'

    # ---- Brands ---------------------------------------------------------------
    BrandInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 150
          description: Nombre de la marca (único por usuario)
        description:
          type: string
          nullable: true
        industry:
          type: string
          maxLength: 100
          nullable: true
        slogan:
          type: string
          maxLength: 255
          nullable: true
        is_active:
          type: boolean
          default: true

    Brand:
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            owner_id:
              type: string
              format: uuid
              readOnly: true
        - $ref: '#/components/schemas/BrandInput'
        - $ref: '#/components/schemas/Timestamps'

    BrandResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Brand'
        meta:
          $ref: '#/components/schemas/Meta'

    BrandList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Brand'
        meta:
          $ref: '#/components/schemas/Meta'

    # ---- Commercials ----------------------------------------------------------
    CommercialInput:
      type: object
      required: [brand_id, title, script]
      properties:
        brand_id:
          type: string
          format: uuid
          description: Marca asociada (debe pertenecer al usuario)
        title:
          type: string
          maxLength: 200
        script:
          type: string
          description: Guion del comercial (3-5 frases)
        duration:
          type: number
          format: float
          default: 30
        campaign:
          type: string
          maxLength: 150
          nullable: true
        is_active:
          type: boolean
          default: true

    Commercial:
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            owner_id:
              type: string
              format: uuid
              readOnly: true
        - $ref: '#/components/schemas/CommercialInput'
        - $ref: '#/components/schemas/Timestamps'

    CommercialResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Commercial'
        meta:
          $ref: '#/components/schemas/Meta'

    CommercialList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Commercial'
        meta:
          $ref: '#/components/schemas/Meta'

    # ---- Characters -----------------------------------------------------------
    CharacterInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 150
          description: Nombre del personaje (único por usuario)
        role:
          type: string
          maxLength: 150
          nullable: true
          example: "Granjero jubilado"
        description:
          type: string
          nullable: true
        personality:
          type: string
          nullable: true
        station_affinity:
          type: string
          nullable: true
          description: Estaciones que escucha (lista separada por comas)

    Character:
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            owner_id:
              type: string
              format: uuid
              readOnly: true
            first_appearance:
              type: string
              format: date-time
              readOnly: true
            last_appearance:
              type: string
              format: date-time
              readOnly: true
        - $ref: '#/components/schemas/CharacterInput'
        - $ref: '#/components/schemas/Timestamps'

    CharacterResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Character'
        meta:
          $ref: '#/components/schemas/Meta'

    CharacterList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Character'
        meta:
          $ref: '#/components/schemas/Meta'

    CharacterMemory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        owner_id:
          type: string
          format: uuid
          readOnly: true
        character_id:
          type: string
          format: uuid
        episode_id:
          type: string
          format: uuid
          nullable: true
        memory:
          type: string
          description: Hecho narrativo recordado
        importance:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true

    CharacterMemoryList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CharacterMemory'
        meta:
          $ref: '#/components/schemas/Meta'

    # ---- Story Events ---------------------------------------------------------
    StoryEventInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
          nullable: true
        related_characters:
          type: string
          nullable: true
          description: Personajes implicados (lista)
        status:
          $ref: '#/components/schemas/StoryStatus'
        resolved_at:
          type: string
          format: date-time
          nullable: true

    StoryEvent:
      allOf:
        - type: object
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            owner_id:
              type: string
              format: uuid
              readOnly: true
        - $ref: '#/components/schemas/StoryEventInput'
        - $ref: '#/components/schemas/Timestamps'

    StoryEventResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/StoryEvent'
        meta:
          $ref: '#/components/schemas/Meta'

    StoryEventList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/StoryEvent'
        meta:
          $ref: '#/components/schemas/Meta'

    # ---- Universe -------------------------------------------------------------
    UniverseSummaryResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            stations:
              type: integer
            episodes:
              type: integer
            news_items:
              type: integer
            brands:
              type: integer
            commercials:
              type: integer
            characters:
              type: integer
            music_tracks:
              type: integer
            story_events:
              type: integer
        meta:
          $ref: '#/components/schemas/Meta'
